name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and Build
        env:
          # Backend API URL - set VITE_API_URL in GitHub Secrets for production
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000/api' }}
          # Google Client ID is public (not a secret) - safe to hardcode
          VITE_GOOGLE_CLIENT_ID: 805742246480-75ak4tlf3qktjo5cirudoiftsea0abpe.apps.googleusercontent.com
        run: |
          cd frontend
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages

# Trigger workflow refresh
